<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body> 
        <!--Every bunch is a row-->
        <!--Row 1-->
        <div id="Backquote">§</div>
        <div id="Digit1">1</div>
        <div id="Digit2">2</div>
        <div id="Digit3">3</div>
        <div id="Digit4">4</div>
        <div id="Digit5">5</div>
        <div id="Digit6">6</div>
        <div id="Digit7">7</div>
        <div id="Digit8">8</div>
        <div id="Digit9">9</div>
        <div id="Digit0">0</div>
        <div id="Minus">+</div>
        <div id="Equal">´</div>
        <div id="Backspace">backspace</div>
        <div id="Home">home</div>

        <!--Row 2-->
        <div id="Tab">tab</div>
        <div id="KeyQ">Q</div>
        <div id="KeyW">W</div>
        <div id="KeyE">E</div>
        <div id="KeyR">R</div>
        <div id="KeyT">T</div>
        <div id="KeyY">Y</div>
        <div id="KeyU">U</div>
        <div id="KeyI">I</div>
        <div id="KeyO">O</div>
        <div id="KeyP">P</div>
        <div id="BracketLeft">Å</div>
        <div id="BracketRight">¨</div>
        <div id="Enter">return</div>
        <div id="PageUp">pg up</div>

        <!--Row 3-->
        <div id="CapsLock">caps lock</div>
        <div id="KeyA">A</div>
        <div id="KeyS">S</div>
        <div id="KeyD">D</div>
        <div id="KeyF">F</div>
        <div id="KeyG">G</div>
        <div id="KeyH">H</div>
        <div id="KeyJ">J</div>
        <div id="KeyK">K</div>
        <div id="KeyL">L</div>
        <div id="Semicolon">Ö</div>
        <div id="Quote">Ä</div>
        <div id="Backslash">'</div>
        <div id="PageDown">pg dn</div>

        <!--Row 4-->
        <div id="ShiftLeft">shift</div>
        <div id="IntlBackslash">&gt;</div>
        <div id="KeyZ">Z</div>
        <div id="KeyX">X</div>
        <div id="KeyC">C</div>
        <div id="KeyV">V</div>
        <div id="KeyB">B</div>
        <div id="KeyN">N</div>
        <div id="KeyM">M</div>
        <div id="Comma">,</div>
        <div id="Period">.</div>
        <div id="Slash">-</div>
        <div id="ShiftRight">shift</div>
        <div id="End">end</div>

        <!--Row 5-->
        <div id="ControlLeft">ctrl</div>
        <div id="fn">fn</div>
        <div id="MetaLeft">windows</div>
        <div id="AltLeft">alt</div>
        <div id="Space"></div>
        <div id="AltRight">alt gr</div>
        <div id="ContextMenu">menu</div>
        <div id="ControlRight">ctrl</div>
        <div id="ArrowLeft">&larr;</div>
        <div id="ArrowUp">&uarr;</div>
        <div id="ArrowDown">&darr;</div>
        <div id="ArrowRight">&rarr;</div>

            

    <script src="js/script.js"></script>
</body>
</html>
